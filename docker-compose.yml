services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: cobweb
      POSTGRES_PASSWORD: cobweb
      POSTGRES_DB: cobweb
    ports: ["5432:5432"]
    volumes: ["pg_data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cobweb"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    volumes: ["redis_data:/data"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: cobweb
      RABBITMQ_DEFAULT_PASS: cobweb
    ports: ["5672:5672", "15672:15672"]
    volumes: ["rabbit_data:/var/lib/rabbitmq"]
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: cobweb
      MINIO_ROOT_PASSWORD: cobwebsecret
    ports: ["9000:9000", "9001:9001"]
    volumes: ["minio_data:/data"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 cobweb cobwebsecret &&
      mc mb -p local/cobweb-artifacts || true &&
      mc anonymous set download local/cobweb-artifacts || true
      "

  zap:
    image: zaproxy/zap-stable
    # Cap JVM heap to keep dev workstations breathing — ZAP's zap.sh appends its
    # own -Xmx based on container memory (default ≈75% of host on a 4GB box).
    # `_JAVA_OPTIONS` is read by the JVM itself and overrides the command-line
    # -Xmx, so it's the cleanest cross-image override.
    environment:
      _JAVA_OPTIONS: "-Xmx512m"
    # Also cap the container so ZAP's auto-calc + Linux OOM killer agree.
    mem_limit: 768m
    command: >
      zap.sh -daemon -host 0.0.0.0 -port 8090
      -config api.key=cobweb-zap-dev-key
      -config api.addrs.addr.name=.*
      -config api.addrs.addr.regex=true
    ports: ["8090:8090"]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8090/JSON/core/view/version/?apikey=cobweb-zap-dev-key || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  opensearch:
    image: opensearchproject/opensearch:2
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    ports: ["9200:9200"]
    volumes: ["os_data:/usr/share/opensearch/data"]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20

volumes:
  pg_data:
  redis_data:
  rabbit_data:
  minio_data:
  os_data:
