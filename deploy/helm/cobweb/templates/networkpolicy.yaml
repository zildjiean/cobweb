{{- if .Values.networkPolicy.enabled }}
# default-deny ingress + egress for the namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "cobweb.fullname" . }}-default-deny
spec:
  podSelector: {}
  policyTypes: ["Ingress", "Egress"]
---
# allow ingress to api/web from ingress-controller namespace, plus DNS egress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "cobweb.fullname" . }}-allow-ingress-controller
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: {{ .Values.networkPolicy.ingressNamespace | default "ingress-nginx" }}
      ports:
        - protocol: TCP
          port: 8000
        - protocol: TCP
          port: 3000
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "cobweb.fullname" . }}-allow-egress-internal
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
  policyTypes: ["Egress"]
  egress:
    # DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # in-namespace pods (postgres/redis/rabbitmq/minio/opensearch in same ns)
    - to:
        - podSelector: {}
    # external HTTPS (template fetches, OIDC, webhooks)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 169.254.0.0/16  # cloud metadata
              - 10.0.0.0/8      # private
              - 172.16.0.0/12   # private
              - 192.168.0.0/16  # private
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 80
{{- end }}
