name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  api:
    name: api · lint + test
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: apps/api } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: pytest -q --cov=cobweb --cov-report=xml
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-coverage
          path: apps/api/coverage.xml

  web:
    name: web · lint + build
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: apps/web } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm build
        env:
          NEXT_PUBLIC_API_BASE: http://localhost:8000

  docker:
    name: docker · build + scan
    runs-on: ubuntu-latest
    needs: [api, web]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/api.Dockerfile
          push: false
          load: true
          tags: cobweb/api:ci
      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/web.Dockerfile
          push: false
          load: true
          tags: cobweb/web:ci
      - name: Trivy scan — api image
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: cobweb/api:ci
          format: table
          severity: CRITICAL,HIGH
          exit-code: 0
          ignore-unfixed: true
      - name: Trivy scan — web image
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: cobweb/web:ci
          format: table
          severity: CRITICAL,HIGH
          exit-code: 0
          ignore-unfixed: true

  helm:
    name: helm · lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - run: helm lint deploy/helm/cobweb
      - run: helm template deploy/helm/cobweb > /tmp/rendered.yaml
