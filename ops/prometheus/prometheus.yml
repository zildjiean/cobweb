global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: node-exporter
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          host: cobweb

  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          host: cobweb
